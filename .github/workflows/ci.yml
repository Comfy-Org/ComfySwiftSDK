name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    # macos-15 ships Xcode 16 / Swift 6, which bundles the Swift Testing
    # framework the test target imports. macos-14 (Xcode 15) does not.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        # --no-parallel is required: the URLProtocol-stub tests share a
        # process-global handler guarded by a blocking lock. Under Swift
        # Testing's default cross-suite parallelism, those blocking acquires
        # starve the cooperative thread pool on low-core CI runners and
        # deadlock. Serial execution removes the contention.
        run: swift test --no-parallel
